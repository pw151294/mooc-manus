harness_version: "1.0"
repo: mooc-manus
inherits:
  - path: ../../.harness          # 从 mooc-manus/.harness/ 出发，../.. 是 mooc-manus-all/，再进 .harness/
    version: "1.0"

cognition:
  loadOrder:
    - rules/40-ddd-layering.md
    - rules/41-go-conventions.md
    - rules/42-llm-protocol.md
    - rules/43-agent-composition.md
    - rules/44-tool-registration.md
    - rules/45-event-emission.md
    - rules/46-prompt-management.md
    - rules/47-memory-boundaries.md
    - rules/48-skill-executor.md
  playbooksIndex: playbooks/INDEX.md
  knowledgeIndex: knowledge/README.md

bridges:
  - file: ../CLAUDE.md
    tool: claude-code
  - file: ../AGENTS.md
    tool: agents-md-standard
  - file: ../.cursorrules
    tool: cursor-legacy
    generated: true

execution:
  agents:
    index: agents/README.md
    items: []
  hooks:
    installer: scripts/bootstrap.sh
    enabled:
      - pre-commit
      - commit-msg
      - pre-push
      - post-checkout
    strictness: warning
  scripts:
    validator: scripts/validate-harness.sh
    cursorrulesGenerator: scripts/generate-cursorrules.sh
    bridgesSync: scripts/sync-bridges.sh
